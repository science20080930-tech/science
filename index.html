<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Core - 學測自然科學總複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --bg-dark: #060b28;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.5;
        }

        .science-btn {
            position: relative;
            background: rgba(16, 20, 50, 0.8);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .science-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            border-color: #fff;
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            position: absolute; top: 0; left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .page-transition { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="home-page" class="page-transition min-h-screen flex flex-col items-center justify-center p-6">
        <header class="text-center mb-16 relative">
            <h1 class="orbitron text-5xl md:text-7xl font-bold tracking-widest text-white mb-4">
                SCIENCE <span class="text-cyan-400">CORE</span>
            </h1>
            <p class="text-cyan-200 tracking-[0.5em] uppercase text-xl md:text-2xl font-bold opacity-90">
                學測自然科學總複習
            </p>
            <div class="h-1 w-48 bg-cyan-500 mx-auto mt-6 shadow-[0_0_15px_rgba(6,182,212,1)]"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 w-full max-w-6xl">
            <!-- 生物 -->
            <a href="./目錄頁/biology/biology.html" class="science-btn p-10 rounded-xl group">
                <div class="scanline"></div>
                <div class="mb-6 text-green-400 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2 tracking-tighter text-white">生物</h2>
                <span class="orbitron text-green-300 text-xs tracking-widest opacity-60">BIOLOGY</span>
            </a>

            <!-- 化學 -->
            <a href="./目錄頁/chemistry/chemistry.html" class="science-btn p-10 rounded-xl group">
                <div class="scanline"></div>
                <div class="mb-6 text-purple-400 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v8L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45L14 10V2"></path><path d="M8.5 2h7"></path><path d="M7 16h10"></path></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2 tracking-tighter text-white">化學</h2>
                <span class="orbitron text-purple-300 text-xs tracking-widest opacity-60">CHEMISTRY</span>
            </a>

            <!-- 物理 -->
            <a href="./目錄頁/physics/physics.html" class="science-btn p-10 rounded-xl group">
                <div class="scanline"></div>
                <div class="mb-6 text-cyan-400 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"></circle><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"></ellipse><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(90 12 12)"></ellipse><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(150 12 12)"></ellipse></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2 tracking-tighter text-white">物理</h2>
                <span class="orbitron text-cyan-300 text-xs tracking-widest opacity-60">PHYSICS</span>
            </a>

            <!-- 地科 -->
            <a href="./目錄頁/earth/earth.html" class="science-btn p-10 rounded-xl group">
                <div class="scanline"></div>
                <div class="mb-6 text-yellow-400 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12a10 10 0 1 0 20 0 10 10 0 1 0-20 0"></path><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2 tracking-tighter text-white">地科</h2>
                <span class="orbitron text-yellow-300 text-xs tracking-widest opacity-60">GEOSCIENCE</span>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.speedY = Math.random() * 0.8 - 0.4;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 243, 255, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() {
            particles = [];
            const particleCount = Math.min(Math.floor(window.innerWidth / 10), 100);
            for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.strokeStyle = `rgba(0, 243, 255, ${0.15 * (1 - dist/120)})`;
                        ctx.lineWidth = 0.5; ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
