<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Core - 學測自然科學總複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-dark: #050a1a;
            --bg-card: rgba(10, 15, 40, 0.85);
            --neon-blue: #00e5ff;
            --green: #00e676;
            --purple: #b388ff;
            --cyan: #00e5ff;
            --yellow: #ffd740;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* 背景網格 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -3;
        }

        /* 背景光暈 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -2;
            opacity: 0.15;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .glow-orb-1 { width: 600px; height: 600px; background: #0055ff; top: -200px; left: -100px; animation-delay: 0s; }
        .glow-orb-2 { width: 500px; height: 500px; background: #0088ff; bottom: -200px; right: -100px; animation-delay: -4s; }
        .glow-orb-3 { width: 400px; height: 400px; background: #00aaff; bottom: 100px; left: 30%; animation-delay: -8s; }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* 粒子畫布 */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9998;
            pointer-events: none;
        }

        /* 故障掃描線 */
        .glitch-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 100, 255, 0.008) 2px,
                rgba(0, 100, 255, 0.008) 4px
            );
            z-index: -1;
            pointer-events: none;
        }

        /* 隨機故障閃爍 */
        .glitch-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: screen;
        }
        .glitch-overlay.flash {
            animation: glitchFlash 0.15s steps(2) forwards;
        }
        @keyframes glitchFlash {
            0% { opacity: 0; }
            20% { opacity: 1; background: linear-gradient(90deg, transparent 30%, rgba(0,100,255,0.08) 30.5%, transparent 31%); }
            40% { opacity: 0; }
            60% { opacity: 1; background: linear-gradient(0deg, transparent 60%, rgba(0,200,255,0.05) 60.5%, transparent 61%); }
            80% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* 標題故障效果 */
        .glitch-text {
            position: relative;
        }
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
        }
        .glitch-text::before {
            color: #ff0040;
            z-index: -1;
        }
        .glitch-text::after {
            color: #00e5ff;
            z-index: -1;
        }
        .glitch-text.active::before {
            animation: glitchBefore 0.2s steps(3) forwards;
        }
        .glitch-text.active::after {
            animation: glitchAfter 0.2s steps(3) forwards;
        }
        @keyframes glitchBefore {
            0% { opacity: 0.8; transform: translate(-3px, 1px); clip-path: inset(20% 0 60% 0); }
            50% { opacity: 0.6; transform: translate(2px, -1px); clip-path: inset(50% 0 20% 0); }
            100% { opacity: 0; transform: translate(0); }
        }
        @keyframes glitchAfter {
            0% { opacity: 0.8; transform: translate(3px, -1px); clip-path: inset(60% 0 10% 0); }
            50% { opacity: 0.6; transform: translate(-2px, 1px); clip-path: inset(10% 0 70% 0); }
            100% { opacity: 0; transform: translate(0); }
        }

        /* 科目卡片 */
        .subject-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            backdrop-filter: blur(20px);
            cursor: pointer;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .subject-card:hover::before { opacity: 1; }

        .subject-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
            box-shadow: 0 20px 60px -15px var(--glow);
        }

        .subject-card .icon-ring {
            width: 90px; height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            border: 2px solid var(--accent);
            transition: all 0.4s;
            box-shadow: 0 0 20px var(--glow);
        }

        .subject-card:hover .icon-ring {
            box-shadow: 0 0 40px var(--glow);
            transform: scale(1.1);
        }

        .subject-card .icon-ring svg {
            width: 40px; height: 40px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 掃描線動畫 */
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            animation: scan 4s linear infinite;
        }
        .subject-card:hover .scanline { opacity: 0.6; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .card-bio { --accent: #00e676; --glow: rgba(0, 230, 118, 0.3); --icon-bg: rgba(0, 230, 118, 0.08); }
        .card-chem { --accent: #b388ff; --glow: rgba(179, 136, 255, 0.3); --icon-bg: rgba(179, 136, 255, 0.08); }
        .card-phys { --accent: #00e5ff; --glow: rgba(0, 229, 255, 0.3); --icon-bg: rgba(0, 229, 255, 0.08); }
        .card-earth { --accent: #ffd740; --glow: rgba(255, 215, 64, 0.3); --icon-bg: rgba(255, 215, 64, 0.08); }

        /* 進場動畫 */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease-out forwards;
        }
        .fade-up:nth-child(1) { animation-delay: 0.1s; }
        .fade-up:nth-child(2) { animation-delay: 0.2s; }
        .fade-up:nth-child(3) { animation-delay: 0.3s; }
        .fade-up:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header-fade {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease-out forwards;
            position: relative;
        }

        /* 標題 Glitch 特效 */
        .glitch-title {
            position: relative;
            display: inline-block;
        }
        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
        }
        .glitch-title::before {
            color: #ff0040;
            z-index: -1;
            animation: glitchTitleBefore 0.3s steps(4) infinite;
        }
        .glitch-title::after {
            color: #00e5ff;
            z-index: -2;
            animation: glitchTitleAfter 0.3s steps(4) infinite;
        }
        @keyframes glitchTitleBefore {
            0% { opacity: 0; clip-path: inset(0 0 0 0); }
            20% { opacity: 0.8; clip-path: inset(30% 0 50% 0); transform: translate(-2px, 1px); }
            40% { opacity: 0; clip-path: inset(0 0 0 0); }
            60% { opacity: 0.8; clip-path: inset(10% 0 80% 0); transform: translate(2px, -1px); }
            100% { opacity: 0; clip-path: inset(0 0 0 0); }
        }
        @keyframes glitchTitleAfter {
            0% { opacity: 0; clip-path: inset(0 0 0 0); }
            20% { opacity: 0.8; clip-path: inset(50% 0 30% 0); transform: translate(2px, -1px); }
            40% { opacity: 0; clip-path: inset(0 0 0 0); }
            60% { opacity: 0.8; clip-path: inset(80% 0 10% 0); transform: translate(-2px, 1px); }
            100% { opacity: 0; clip-path: inset(0 0 0 0); }
        }

        /* 底部裝飾線 */
        .bottom-line {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.3), transparent);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="grid-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
    <div class="glitch-scanlines"></div>
    <div class="glitch-overlay" id="glitchOverlay"></div>
    <canvas id="particle-canvas"></canvas>

    <!-- Header -->
    <header class="text-center mb-16 header-fade">
        <div class="flex items-center justify-center gap-3 mb-4">
            <div class="h-px w-12 bg-gradient-to-r from-transparent to-cyan-500"></div>
            <span class="orbitron text-xs tracking-[0.4em] text-cyan-500 uppercase">Natural Science Review</span>
            <div class="h-px w-12 bg-gradient-to-l from-transparent to-cyan-500"></div>
        </div>
        <h1 class="orbitron text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-wider text-white mb-3 glitch-text glitch-title" data-text="SCIENCE CORE">
            SCIENCE <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">CORE</span>
        </h1>
        <p class="text-cyan-200/70 tracking-[0.5em] uppercase text-lg md:text-xl font-bold">
            學測自然科學總複習
        </p>
        <div class="h-1 w-32 bg-gradient-to-r from-cyan-500 to-blue-600 mx-auto mt-6 rounded-full shadow-[0_0_20px_rgba(0,229,255,0.5)]"></div>
    </header>

    <!-- 科目卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 w-full max-w-6xl px-2 sm:px-0">

        <!-- 生物 -->
        <a href="./目錄頁/biology/biology.html" class="subject-card card-bio fade-up h-full">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <path d="M8 2c0 4 2.5 6 5 8c-2.5 2-5 4-5 8"/>
                    <path d="M16 2c0 4-2.5 6-5 8c2.5 2 5 4 5 8"/>
                    <path d="M9 4h6"/>
                    <path d="M9 8h6"/>
                    <path d="M9 12h6"/>
                    <path d="M9 16h6"/>
                    <path d="M9 20h6"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">生物</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">BIOLOGY</span>
        </a>

        <!-- 化學 -->
        <a href="./目錄頁/chemistry/chemistry.html" class="subject-card card-chem fade-up h-full">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/>
                    <path d="M8.5 2h7"/>
                    <path d="M7 16.5h10"/>
                    <circle cx="14" cy="18.5" r="0.8" fill="currentColor" stroke="none"/>
                    <circle cx="11" cy="19" r="0.6" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">化學</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">CHEMISTRY</span>
        </a>

        <!-- 物理 -->
        <a href="./目錄頁/physics/physics.html" class="subject-card card-phys fade-up h-full">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="2"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(0 12 12)"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">物理</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">PHYSICS</span>
        </a>

        <!-- 地科 -->
        <a href="./目錄頁/earth/earth.html" class="subject-card card-earth fade-up h-full">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <path d="M2 12h20"/>
                    <path d="M4.5 7h15"/>
                    <path d="M4.5 17h15"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">地科</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">EARTH SCIENCE</span>
        </a>
    </div>

    <div class="flex justify-center mt-12 mb-6">
        <div class="orbitron text-xs tracking-[0.2em] text-cyan-500/60">invented by 䳦</div>
    </div>

    <div class="bottom-line"></div>

    <script>
        /* ===== 粒子系統（增強版） ===== */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', () => { resize(); init(); });
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseSize = Math.random() * 2 + 0.5;
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                // 深藍色系隨機色調
                const hue = 200 + Math.random() * 40; // 200-240 深藍範圍
                const light = 50 + Math.random() * 30;
                this.color = `hsla(${hue}, 100%, ${light}%, `;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += this.pulseSpeed;
                this.size = this.baseSize + Math.sin(this.pulse) * 0.5;

                // 滑鼠互動：靠近時粒子微微排斥
                if (mouse.x !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150 * 0.3;
                        this.x += (dx / dist) * force;
                        this.y += (dy / dist) * force;
                    }
                }

                if (this.x > canvas.width + 10) this.x = -10;
                else if (this.x < -10) this.x = canvas.width + 10;
                if (this.y > canvas.height + 10) this.y = -10;
                else if (this.y < -10) this.y = canvas.height + 10;
            }
            draw() {
                const alpha = 0.3 + Math.sin(this.pulse) * 0.15;
                ctx.fillStyle = this.color + alpha + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                // 粒子光暈
                ctx.fillStyle = this.color + (alpha * 0.3) + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const count = Math.min(Math.floor((canvas.width * canvas.height) / 8000), 150);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });

            // 連線
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 160) {
                        const alpha = 0.12 * (1 - dist / 160);
                        ctx.strokeStyle = `rgba(0, 120, 255, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // 滑鼠附近畫額外連線
            if (mouse.x !== null) {
                particles.forEach(p => {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        const alpha = 0.2 * (1 - dist / 200);
                        ctx.strokeStyle = `rgba(0, 180, 255, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                });
            }

            requestAnimationFrame(animate);
        }
        init();
        animate();

        /* ===== 故障特效 ===== */
        const glitchOverlay = document.getElementById('glitchOverlay');
        const glitchTitle = document.querySelector('.glitch-text');

        function triggerGlitch() {
            // 畫面閃爍
            glitchOverlay.classList.remove('flash');
            void glitchOverlay.offsetWidth;
            glitchOverlay.classList.add('flash');

            // 標題故障
            glitchTitle.classList.remove('active');
            void glitchTitle.offsetWidth;
            glitchTitle.classList.add('active');

            // 隨機下次觸發時間 3~8 秒
            setTimeout(triggerGlitch, 3000 + Math.random() * 5000);
        }
        setTimeout(triggerGlitch, 2000);
    </script>
</body>
</html>
