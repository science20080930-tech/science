<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Core - 學測自然科學總複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-dark: #050a1a;
            --bg-card: rgba(10, 15, 40, 0.85);
            --neon-blue: #00e5ff;
            --green: #00e676;
            --purple: #b388ff;
            --cyan: #00e5ff;
            --yellow: #ffd740;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* 背景網格 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
        }

        /* 背景光暈 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
        }
        .glow-orb-1 { width: 600px; height: 600px; background: #00e5ff; top: -200px; left: -100px; }
        .glow-orb-2 { width: 500px; height: 500px; background: #b388ff; bottom: -200px; right: -100px; }
        .glow-orb-3 { width: 400px; height: 400px; background: #00e676; bottom: 100px; left: 30%; }

        /* 粒子畫布 */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
        }

        /* 科目卡片 */
        .subject-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            backdrop-filter: blur(20px);
            cursor: pointer;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .subject-card:hover::before { opacity: 1; }

        .subject-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
            box-shadow: 0 20px 60px -15px var(--glow);
        }

        .subject-card .icon-ring {
            width: 90px; height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            border: 2px solid var(--accent);
            transition: all 0.4s;
            box-shadow: 0 0 20px var(--glow);
        }

        .subject-card:hover .icon-ring {
            box-shadow: 0 0 40px var(--glow);
            transform: scale(1.1);
        }

        .subject-card .icon-ring svg {
            width: 40px; height: 40px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 掃描線動畫 */
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            animation: scan 4s linear infinite;
        }
        .subject-card:hover .scanline { opacity: 0.6; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* 生物 */
        .card-bio { --accent: #00e676; --glow: rgba(0, 230, 118, 0.3); --icon-bg: rgba(0, 230, 118, 0.08); }
        /* 化學 */
        .card-chem { --accent: #b388ff; --glow: rgba(179, 136, 255, 0.3); --icon-bg: rgba(179, 136, 255, 0.08); }
        /* 物理 */
        .card-phys { --accent: #00e5ff; --glow: rgba(0, 229, 255, 0.3); --icon-bg: rgba(0, 229, 255, 0.08); }
        /* 地科 */
        .card-earth { --accent: #ffd740; --glow: rgba(255, 215, 64, 0.3); --icon-bg: rgba(255, 215, 64, 0.08); }

        /* 進場動畫 */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease-out forwards;
        }
        .fade-up:nth-child(1) { animation-delay: 0.1s; }
        .fade-up:nth-child(2) { animation-delay: 0.2s; }
        .fade-up:nth-child(3) { animation-delay: 0.3s; }
        .fade-up:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header-fade {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease-out forwards;
        }

        /* 底部裝飾線 */
        .bottom-line {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.3), transparent);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="grid-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
    <canvas id="particle-canvas"></canvas>

    <!-- Header -->
    <header class="text-center mb-16 header-fade">
        <div class="flex items-center justify-center gap-3 mb-4">
            <div class="h-px w-12 bg-gradient-to-r from-transparent to-cyan-500"></div>
            <span class="orbitron text-xs tracking-[0.4em] text-cyan-500 uppercase">Natural Science Review</span>
            <div class="h-px w-12 bg-gradient-to-l from-transparent to-cyan-500"></div>
        </div>
        <h1 class="orbitron text-5xl md:text-7xl font-black tracking-wider text-white mb-3">
            SCIENCE <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">CORE</span>
        </h1>
        <p class="text-cyan-200/70 tracking-[0.5em] uppercase text-lg md:text-xl font-bold">
            學測自然科學總複習
        </p>
        <div class="h-1 w-32 bg-gradient-to-r from-cyan-500 to-blue-600 mx-auto mt-6 rounded-full shadow-[0_0_20px_rgba(0,229,255,0.5)]"></div>
    </header>

    <!-- 科目卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">

        <!-- 生物 -->
        <a href="./目錄頁/biology/biology.html" class="subject-card card-bio fade-up">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <path d="M8 2c0 4 2.5 6 5 8c-2.5 2-5 4-5 8"/>
                    <path d="M16 2c0 4-2.5 6-5 8c2.5 2 5 4 5 8"/>
                    <path d="M9 4h6"/>
                    <path d="M9 8h6"/>
                    <path d="M9 12h6"/>
                    <path d="M9 16h6"/>
                    <path d="M9 20h6"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">生物</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">BIOLOGY</span>
        </a>

        <!-- 化學 -->
        <a href="./目錄頁/chemistry/chemistry.html" class="subject-card card-chem fade-up">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/>
                    <path d="M8.5 2h7"/>
                    <path d="M7 16.5h10"/>
                    <circle cx="14" cy="18.5" r="0.8" fill="currentColor" stroke="none"/>
                    <circle cx="11" cy="19" r="0.6" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">化學</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">CHEMISTRY</span>
        </a>

        <!-- 物理 -->
        <a href="./目錄頁/physics/physics.html" class="subject-card card-phys fade-up">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="2"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(0 12 12)"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">物理</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">PHYSICS</span>
        </a>

        <!-- 地科 -->
        <a href="./目錄頁/earth/earth.html" class="subject-card card-earth fade-up">
            <div class="scanline"></div>
            <div class="icon-ring">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <path d="M2 12h20"/>
                    <path d="M4.5 7h15"/>
                    <path d="M4.5 17h15"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">地科</h2>
            <span class="orbitron text-[10px] tracking-[0.3em] opacity-50" style="color: var(--accent);">EARTH SCIENCE</span>
        </a>
    </div>

    <div class="bottom-line"></div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.35)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() {
            particles = [];
            const count = Math.min(Math.floor(window.innerWidth / 12), 80);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 130) {
                        ctx.strokeStyle = `rgba(0, 229, 255, ${0.08 * (1 - dist / 130)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
