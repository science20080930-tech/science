<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Science - 地科筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../custom-cursor.css">
    <link rel="stylesheet" href="../mobile-layout.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        :root {
            --bg: #050a1a;
            --accent: #ffd740;
            --accent-dim: rgba(255, 215, 64, 0.15);
            --card-bg: rgba(10, 15, 40, 0.86);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 72% 0%, rgba(255, 215, 64, 0.14), transparent 34%), var(--bg);
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .grid-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,215,64,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,215,64,0.02) 1px, transparent 1px);
            background-size: 60px 60px; z-index: -2;
        }
        .glow-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -2; opacity: 0.12;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .glow-orb-1 { width: 500px; height: 500px; background: #ffd740; top: -150px; right: -100px; }
        .glow-orb-2 { width: 400px; height: 400px; background: #0088ff; bottom: -150px; left: -100px; animation-delay: -4s; }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
        }
        .return-btn {
            border: 1px solid rgba(255,215,64,0.3);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            background: rgba(255,215,64,0.05);
        }
        .return-btn:hover {
            background: rgba(255,215,64,0.15);
            box-shadow: 0 0 20px rgba(255,215,64,0.3);
            border-color: var(--accent);
        }
        .note-list {
            display: grid;
            gap: .9rem;
        }
        .note-item {
            width: 100%;
            text-align: left;
            border: 1px solid rgba(255,215,64,0.18);
            background: rgba(255,215,64,0.055);
            border-radius: 16px;
            padding: 1rem;
            transition: all .25s ease;
            color: inherit;
        }
        .note-item:hover,
        .note-item.is-active {
            border-color: var(--accent);
            background: rgba(255,215,64,0.13);
            box-shadow: 0 0 24px rgba(255,215,64,.22);
            transform: translateY(-2px);
        }
        .note-item.is-active {
            outline: 1px solid rgba(255,235,160,.26);
        }
        .preview-card {
            border: 1px solid rgba(255,215,64,0.2);
            background: linear-gradient(180deg, rgba(35, 29, 13, .92), rgba(7, 14, 31, .92));
            border-radius: 18px;
            overflow: hidden;
        }
        .preview-shell {
            height: 560px;
            background: #041021;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }
        .preview-viewport {
            position: absolute;
            inset: 0;
            width: 125%;
            height: 125%;
            transform: scale(.8);
            transform-origin: top left;
            border: 0;
            background: #050a1a;
            pointer-events: none;
        }
        .preview-overlay {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255,235,160,.12);
            pointer-events: none;
        }
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: .65rem;
        }
        .meta-chip {
            border: 1px solid rgba(255,215,64,.26);
            background: rgba(255,215,64,.07);
            color: rgba(255,242,190,.86);
            border-radius: 999px;
            padding: .35rem .75rem;
            font-size: .76rem;
            letter-spacing: .08em;
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        html.device-phone body,
        html.device-tablet body {
            touch-action: manipulation;
        }
        html.device-phone .preview-shell {
            height: min(68vh, 520px);
            min-height: 360px;
        }
        html.device-phone .preview-viewport,
        html.device-tablet .preview-viewport {
            width: 100%;
            height: 100%;
            transform: none;
        }
        html.device-tablet .preview-shell {
            height: min(62vh, 620px);
            min-height: 460px;
        }
        @media (max-width: 768px) {
            body { padding: 1rem !important; }
            .glass-panel { padding: 1rem !important; }
            .note-item { border-radius: 14px; padding: .9rem; }
            .preview-shell { height: min(68vh, 520px); min-height: 360px; }
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="grid-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="fixed top-6 right-6 orbitron text-xs tracking-[0.2em] text-yellow-400/60 z-50">invented by 䳦</div>

    <main class="max-w-6xl mx-auto fade-in">
        <div class="flex justify-between items-center mb-10">
            <a href="../../index.html" class="return-btn px-6 py-2.5 rounded-full orbitron text-xs tracking-[0.2em] text-yellow-400 flex items-center gap-2">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                HOME
            </a>
        </div>

        <header class="flex justify-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: var(--accent-dim); border: 1px solid var(--accent);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                        <path d="M2 12h20"/>
                        <path d="M4.5 7h15"/><path d="M4.5 17h15"/>
                    </svg>
                </div>
                <h1 class="orbitron text-2xl md:text-3xl font-bold text-white tracking-tight">EARTH SCIENCE <span class="text-yellow-300">DATA</span></h1>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-4 lg:gap-6">
            <aside class="lg:col-span-1">
                <div class="glass-panel p-6">
                    <h2 class="orbitron text-sm font-bold text-yellow-300 mb-6 flex items-center gap-2 tracking-wider">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                        地科筆記目錄
                    </h2>
                    <div class="note-list" id="noteList"></div>
                </div>
            </aside>

            <section class="lg:col-span-2">
                <div class="glass-panel p-6 md:p-8 h-full min-h-[560px]">
                    <article class="preview-card">
                        <div class="p-5 border-b border-white/10">
                            <div class="orbitron text-xs tracking-[0.22em] text-yellow-300/70 mb-2" id="previewCode">NOTE 01</div>
                            <h2 class="text-3xl md:text-4xl font-black text-white" id="previewTitle">太陽星雲學說</h2>
                            <p class="text-yellow-100/70 leading-7 mt-3" id="previewDescription">用太陽星雲收縮、旋轉盤與吸積作用整理太陽系形成流程。</p>
                        </div>
                        <div class="preview-shell" aria-label="筆記頁面縮圖預覽">
                            <iframe class="preview-viewport" id="previewFrame" title="筆記頁面縮圖" src="地科筆記1/solar-nebula-theory.html"></iframe>
                            <div class="preview-overlay"></div>
                        </div>
                        <div class="p-5 flex flex-col gap-4">
                            <div class="meta-row" id="previewTags"></div>
                            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                <p class="text-yellow-100/70 leading-7">連續點同一筆記兩次才會進入正式頁面；切換到其他筆記後，再點回來會先顯示縮圖預覽。</p>
                                <a id="openNoteLink" href="地科筆記1/solar-nebula-theory.html" class="return-btn px-5 py-2.5 rounded-full orbitron text-xs tracking-[0.2em] text-yellow-300 text-center">OPEN NOTE</a>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
        </section>
    </main>

    <script src="../custom-cursor.js"></script>
    <script src="../bg-effects.js"></script>
    <script>
        const notes = [
            {
                code: 'NOTE 01',
                title: '太陽星雲學說',
                description: '用太陽星雲收縮、旋轉盤與吸積作用整理太陽系形成流程。',
                url: '地科筆記1/solar-nebula-theory.html',
                tags: ['太陽系形成', '重力收縮', '角動量守恆', '吸積作用']
            }
        ];

        const noteList = document.getElementById('noteList');
        const previewCode = document.getElementById('previewCode');
        const previewTitle = document.getElementById('previewTitle');
        const previewDescription = document.getElementById('previewDescription');
        const previewFrame = document.getElementById('previewFrame');
        const previewTags = document.getElementById('previewTags');
        const openNoteLink = document.getElementById('openNoteLink');
        let activeNoteIndex = -1;
        let lastClickedNoteIndex = -1;

        function renderTags(tags) {
            previewTags.innerHTML = tags.map(tag => `<span class="meta-chip orbitron">${tag}</span>`).join('');
        }

        function showPreview(index, markActive = true) {
            const note = notes[index];
            if (markActive) activeNoteIndex = index;
            previewCode.textContent = note.code;
            previewTitle.textContent = note.title;
            previewDescription.textContent = note.description;
            previewFrame.src = note.url;
            openNoteLink.href = note.url;
            renderTags(note.tags);
            document.querySelectorAll('.note-item').forEach((button, buttonIndex) => {
                const isActive = markActive && buttonIndex === index;
                button.classList.toggle('is-active', isActive);
                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });
        }

        noteList.innerHTML = notes.map((note, index) => `
            <button class="note-item" type="button" data-note-index="${index}" aria-pressed="false">
                <div class="orbitron text-xs tracking-[0.22em] text-yellow-300/70 mb-2">${note.code}</div>
                <div class="text-white text-xl font-bold mb-2">${note.title}</div>
                <p class="text-yellow-100/60 text-sm leading-6">${note.description}</p>
            </button>
        `).join('');

        noteList.addEventListener('click', event => {
            const button = event.target.closest('.note-item');
            if (!button) return;
            const noteIndex = Number(button.dataset.noteIndex);
            if (noteIndex === lastClickedNoteIndex) {
                window.location.href = notes[noteIndex].url;
                return;
            }
            lastClickedNoteIndex = noteIndex;
            showPreview(noteIndex);
        });

        showPreview(0, false);
    </script>
</body>
</html>
