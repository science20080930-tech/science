<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry - 化學複習目錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        :root {
            --bg: #050a1a;
            --accent: #b388ff;
            --accent-dim: rgba(179, 136, 255, 0.15);
            --card-bg: rgba(10, 15, 40, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(179,136,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(179,136,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px; z-index: -2;
        }
        .glow-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -2; opacity: 0.12;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .glow-orb-1 { width: 500px; height: 500px; background: #0055ff; top: -150px; right: -100px; }
        .glow-orb-2 { width: 400px; height: 400px; background: #0088ff; bottom: -150px; left: -100px; animation-delay: -4s; }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }
        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
        }
        .nav-container { min-height: 200px; }
        .return-btn {
            border: 1px solid rgba(179,136,255,0.3); transition: all 0.3s;
            backdrop-filter: blur(10px); background: rgba(179,136,255,0.05);
        }
        .return-btn:hover {
            background: rgba(179,136,255,0.15); box-shadow: 0 0 20px rgba(179,136,255,0.3);
            border-color: var(--accent);
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="grid-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="max-w-6xl mx-auto fade-in">
        <div class="flex justify-between items-center mb-10">
            <a href="../../index.html" class="return-btn px-6 py-2.5 rounded-full orbitron text-xs tracking-[0.2em] text-purple-300 flex items-center gap-2">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                HOME
            </a>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: var(--accent-dim); border: 1px solid var(--accent);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/>
                        <path d="M8.5 2h7"/><path d="M7 16.5h10"/>
                    </svg>
                </div>
                <h1 class="orbitron text-2xl md:text-3xl font-bold text-white tracking-tight">CHEMISTRY <span class="text-purple-300">DATA</span></h1>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
                <div class="glass-panel p-6">
                    <h3 class="orbitron text-sm font-bold text-purple-300 mb-6 flex items-center gap-2 tracking-wider">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                        化學目錄
                    </h3>
                    <div class="nav-container">
                        <!-- 章節項目將在新增對應網頁後加入 -->
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="glass-panel p-8 h-full min-h-[500px] flex flex-col justify-center items-center text-center">
                    <div class="mb-6 opacity-15">
                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/>
                            <path d="M8.5 2h7"/><path d="M7 16.5h10"/>
                        </svg>
                    </div>
                    <h2 class="orbitron text-xl font-bold text-white mb-2">請選擇化學章節</h2>
                    <p class="text-purple-300/40 text-sm max-w-md">選擇左側章節以進入深入複習模組。</p>
                </div>
            </div>
        </div>
    </div>
    <script src="../bg-effects.js"></script>
</body>
</html>
