<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoscience - 地科複習目錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        body {
            background-color: #060b28;
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: rgba(16, 20, 50, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(250, 204, 21, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.1);
        }
        .nav-item {
            position: relative;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-item:hover {
            border-left-color: #facc15;
            background: rgba(250, 204, 21, 0.1);
            padding-left: 1.5rem;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #facc15;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #facc15;
        }
        .return-btn {
            border: 1px solid rgba(250, 204, 21, 0.5);
            transition: all 0.3s;
        }
        .return-btn:hover {
            background: rgba(250, 204, 21, 0.2);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20" style="background: radial-gradient(circle at 50% 50%, #713f12 0%, transparent 70%);"></div>

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <a href="../index.html" class="return-btn px-8 py-2 rounded-full orbitron text-sm tracking-[0.2em] text-yellow-400 flex items-center">
                <svg class="mr-2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                HOME
            </a>
            <div class="text-right">
                <h1 class="orbitron text-3xl font-bold text-white tracking-tighter">EARTH <span class="text-yellow-400">DATA</span></h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass-panel p-6">
                    <h3 class="orbitron text-lg font-bold text-yellow-400 mb-6 flex items-center">
                        <svg class="mr-2" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                        地科目錄
                    </h3>
                    <div class="nav-container">
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">天文與地球與宇宙</span>
                        </div>
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">大氣與氣候變遷</span>
                        </div>
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">固體地球的變動</span>
                        </div>
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">海洋科學基礎</span>
                        </div>
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">固體地球歷史</span>
                        </div>
                        <div class="nav-item">
                            <span class="status-dot"></span>
                            <span class="font-medium text-lg">人與地球環境</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-panel p-8 h-full min-h-[500px] flex flex-col justify-center items-center text-center">
                    <div class="mb-6 opacity-20">
                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="0.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20M2 12h20"/></svg>
                    </div>
                    <h2 class="orbitron text-2xl font-bold text-white mb-2">請選擇地科章節</h2>
                    <p class="text-yellow-600 max-w-md">選擇左側章節以進入深入複習模組。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
